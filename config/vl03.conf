# User Configuration for ${keyboard.name}

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable ZMK Studio (runtime keymap editing).
# The USB transport for Studio is provided by the `studio-rpc-usb-uart`
# snippet, which is added to the vl03 build in build.yaml.
CONFIG_ZMK_STUDIO=y

# WS2812B 4x4 (16 LED) panel, wired to GP9 (see vl03.overlay).
# Brightness is capped at 50% to keep worst-case current draw (all pixels
# white) within what a USB port can reliably supply.
# CONFIG_LED_STRIP and CONFIG_WS2812_STRIP are bare menuconfigs with no
# default and no devicetree auto-detection on the Zephyr version ZMK pins
# (v3.5.0+zmk-fixes) - both have to be turned on explicitly, or the ws2812
# driver code backing our devicetree node never gets compiled in and the
# link fails. WS2812_STRIP_SPI is the default backend once WS2812_STRIP is
# enabled and SPI is available, which it is here.
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=50

# Boot-time default: solid orange. Runtime changes made via the RGB layer
# aren't reliably surviving a power cycle (flash settings persistence issue),
# so this pins a known-good default instead of relying on the saved value.
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=30
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100

# This board has no MOSFET/switch for cutting external power to the LED
# panel - it's powered straight off 5V - so there's no ext-power device to
# control. The underglow driver requires one to exist when this is enabled.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
